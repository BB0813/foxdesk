name: Build FoxDesk Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 1.1.0-beta.1). Empty = use VERSION file / tag.'
        required: false
      prerelease:
        description: 'Mark GitHub Release as prerelease'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        shell: pwsh
        run: |
          $inputVersion = "${{ github.event.inputs.version }}"
          $tagRef = "${{ github.ref_name }}"
          $fileVersion = (Get-Content VERSION -Raw).Trim()

          if ($inputVersion) {
            $version = $inputVersion.TrimStart('v')
          } elseif ($tagRef -like 'v*') {
            $version = $tagRef.TrimStart('v')
          } else {
            $version = $fileVersion
          }

          $tag = "v$version"
          $isPre = "false"
          if ($version -match 'beta|alpha|rc|pre') { $isPre = "true" }
          if ("${{ github.event.inputs.prerelease }}" -eq "true") { $isPre = "true" }
          if ("${{ github.event.inputs.prerelease }}" -eq "false" -and -not ($version -match 'beta|alpha|rc|pre')) { $isPre = "false" }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "is_prerelease=$isPre" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved version=$version tag=$tag prerelease=$isPre"

      - name: Sync version into project files
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          Set-Content -Path VERSION -Value $version -NoNewline

          # App-facing version string (may include beta/rc)
          foreach ($file in @('desktop.py', 'backend/app.py', 'README.md')) {
            if (Test-Path $file) {
              $content = Get-Content $file -Raw
              $content = $content -replace 'APP_VERSION\s*=\s*"[^"]+"', "APP_VERSION = `"$version`""
              $content = $content -replace '1\.1\.0-beta\.\d+', $version
              $content = $content -replace '(?m)\*\*当前版本：`[^`]+`\*\*', "**当前版本：``$version``**"
              Set-Content -Path $file -Value $content -NoNewline
            }
          }

          # Inno Setup: AppVersion can be pre-release text; VERSIONINFO must be numeric.
          $numeric = ($version -replace '[^0-9.].*$', '').Trim('.')
          if (-not $numeric) { $numeric = '0.0.0' }
          $parts = $numeric.Split('.')
          while ($parts.Count -lt 4) { $parts += '0' }
          $fileVersion = ($parts[0..3] -join '.')

          $iss = Get-Content installer.iss -Raw
          $iss = $iss -replace '#define MyAppVersion ".*?"', "#define MyAppVersion `"$version`""
          $iss = $iss -replace 'VersionInfoVersion=.*', "VersionInfoVersion=$fileVersion"
          $iss = $iss -replace 'VersionInfoProductVersion=.*', "VersionInfoProductVersion=$fileVersion"
          Set-Content -Path installer.iss -Value $iss -NoNewline
          Write-Host "Inno AppVersion=$version VersionInfo=$fileVersion"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pillow

      - name: Syntax check
        run: |
          python -m compileall backend desktop.py
          node --check static/app.js

      - name: Create icon
        run: python make_ico.py

      - name: Build with PyInstaller
        run: python -m PyInstaller foxdesk.spec --noconfirm --clean --log-level WARN

      - name: Smoke test frozen CLI flags
        shell: pwsh
        run: |
          $exe = "dist/FoxDesk/FoxDesk.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe" }
          # Missing runtime should fail fast (no GUI hang).
          $p = Start-Process -FilePath $exe -ArgumentList @('--worker', 'missing-runtime.json') -PassThru -WindowStyle Hidden
          if (-not $p.WaitForExit(30000)) {
            try { $p.Kill() } catch {}
            throw "worker smoke test timed out after 30s"
          }
          Write-Host "worker missing exit=$($p.ExitCode)"
          if ($p.ExitCode -eq 0) { throw "expected non-zero exit for missing runtime" }

          # Ensure camoufox + fingerprint datapoints are bundled (first-run setup depends on this).
          $camoufoxDir = Get-ChildItem -Path "dist/FoxDesk" -Recurse -Directory -Filter "camoufox" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $camoufoxDir) {
            throw "camoufox package directory missing from dist/FoxDesk - packaging failed"
          }
          $pkgman = Join-Path $camoufoxDir.FullName "pkgman.py"
          if (-not (Test-Path $pkgman)) {
            throw "camoufox/pkgman.py missing from bundle: $($camoufoxDir.FullName)"
          }
          Write-Host "bundled camoufox at $($camoufoxDir.FullName)"

          $apifyDir = Get-ChildItem -Path "dist/FoxDesk" -Recurse -Directory -Filter "apify_fingerprint_datapoints" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $apifyDir) {
            throw "apify_fingerprint_datapoints package missing from dist/FoxDesk - packaging failed"
          }
          $requiredZips = @(
            "input-network-definition.zip",
            "header-network-definition.zip",
            "fingerprint-network-definition.zip"
          )
          foreach ($name in $requiredZips) {
            $zipPath = Join-Path $apifyDir.FullName "data\$name"
            if (-not (Test-Path $zipPath)) {
              throw "missing required datapoint file: $zipPath"
            }
          }
          Write-Host "bundled apify datapoints at $($apifyDir.FullName)"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = Get-ChildItem "C:\Program Files*\Inno Setup 6\ISCC.exe" | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe not found" }
          & $iscc.FullName installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed" }

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          Compress-Archive -Path "dist/FoxDesk/*" -DestinationPath "FoxDesk-windows-x64-$version.zip" -Force

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoxDesk-Installer
          path: installer_output/FoxDesk-*-Setup.exe
          retention-days: 30

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoxDesk-Portable
          path: |
            FoxDesk-windows-x64-*.zip
            dist/FoxDesk/
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: FoxDesk-Installer
          path: dist/

      - name: Download portable
        uses: actions/download-artifact@v4
        with:
          name: FoxDesk-Portable
          path: portable/

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp dist/FoxDesk-*-Setup.exe release/ || true
          if ls portable/FoxDesk-windows-x64-*.zip >/dev/null 2>&1; then
            cp portable/FoxDesk-windows-x64-*.zip release/
          else
            cd portable
            zip -r "../release/FoxDesk-windows-x64-${{ needs.build-windows.outputs.version }}.zip" .
            cd ..
          fi
          ls -lah release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag }}
          name: FoxDesk ${{ needs.build-windows.outputs.version }}
          prerelease: ${{ needs.build-windows.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release/*
          body: |
            ## FoxDesk ${{ needs.build-windows.outputs.version }}

            Local Camoufox fingerprint browser manager (Windows).

            ### Downloads
            - **Installer**: `FoxDesk-*-Setup.exe`
            - **Portable**: `FoxDesk-windows-x64-*.zip`

            ### Notes
            - First run may need Camoufox browser fetch from the System panel.
            - Data directory: `%APPDATA%\CamoufoxManager`
            - This build includes frozen worker launch (`FoxDesk.exe --worker`), offline icons, and fingerprint/cookie fixes.
